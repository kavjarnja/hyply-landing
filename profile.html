    <style>
      .cabinet-profile-page .profile-main {
        display: flex;
        justify-content: center;
        padding: 40px 32px;
      }

      .cabinet-profile-page .profile-shell {
        width: min(100%, 480px);
        padding-inline: 32px;
      }

      .cabinet-profile-page .profile-back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 0;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 800;
        line-height: 22px;
        padding: 0;
      }

      .cabinet-profile-page .profile-back span {
        display: inline-flex;
        width: 40px;
        height: 40px;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-sm);
      }

      .cabinet-profile-page .profile-shell h1 {
        color: var(--text-primary);
        font-size: 32px;
        font-weight: 700;
        line-height: 40px;
        margin: 24px 0 0;
      }

      .cabinet-profile-page .profile-card {
        overflow: hidden;
        border: 1px solid var(--surface-border);
        border-radius: 16px;
        background: var(--surface-primary);
        margin-top: 24px;
      }

      .cabinet-profile-page .profile-card-head {
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid var(--surface-border);
        padding: 24px;
      }

      .cabinet-profile-page .profile-avatar-upload {
        position: relative;
        border: 0;
        border-radius: 999px;
        background: transparent;
        cursor: pointer;
        padding: 0;
      }

      .cabinet-profile-page .profile-avatar-upload::after {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(25, 11, 90, 0.42);
        color: var(--surface-primary);
        content: "Змінити";
        font-size: 11px;
        font-weight: 800;
        line-height: 18px;
        opacity: 0;
        transition: opacity 160ms ease;
      }

      .cabinet-profile-page .profile-avatar-upload:hover::after,
      .cabinet-profile-page .profile-avatar-upload:focus-visible::after {
        opacity: 1;
      }

      .cabinet-profile-page .profile-page-avatar {
        display: inline-flex;
        width: 64px;
        height: 64px;
        overflow: hidden;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: var(--secondary-500);
        color: var(--surface-primary);
        font-size: 18px;
        font-weight: 800;
        line-height: 30px;
      }

      .cabinet-profile-page .profile-card-head strong {
        display: block;
        overflow: hidden;
        color: var(--text-primary);
        font-size: 16px;
        font-weight: 800;
        line-height: 26px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .cabinet-profile-page .profile-card-head small {
        display: block;
        overflow: hidden;
        color: var(--text-muted);
        font-size: 14px;
        line-height: 22px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .cabinet-profile-page .profile-fields {
        display: grid;
        gap: 16px;
        padding: 20px 24px 16px;
      }

      .cabinet-profile-page .profile-fields label {
        display: grid;
        gap: 4px;
      }

      .cabinet-profile-page .profile-fields span {
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 800;
        line-height: 22px;
      }

      .cabinet-profile-page .profile-fields input {
        width: 100%;
        height: 48px;
        border: 1px solid var(--surface-border);
        border-radius: var(--radius-md);
        background: var(--surface-background);
        color: var(--text-secondary);
        font: inherit;
        font-size: 14px;
        line-height: 22px;
        padding: 13px 17px;
      }

      .cabinet-profile-page .profile-fields input:focus {
        border-color: var(--primary-500);
        outline: 0;
      }

      .cabinet-profile-page .profile-fields input:disabled {
        color: var(--text-muted);
        cursor: not-allowed;
      }

      .cabinet-profile-page .profile-save {
        min-height: 48px;
        border: 0;
        border-radius: var(--radius-md);
        background: var(--primary-500);
        color: var(--surface-primary);
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        line-height: 22px;
        padding: 12px 24px;
        transition: background 160ms ease;
      }

      .cabinet-profile-page .profile-save:hover {
        background: var(--primary-600);
      }

      .cabinet-profile-page .profile-save:active {
        background: var(--primary-700);
      }

      @media (max-width: 760px) {
        .cabinet-profile-page .profile-main {
          padding-right: 16px;
          padding-left: 16px;
        }

        .cabinet-profile-page .profile-shell {
          padding-right: 0;
          padding-left: 0;
        }
      }
    </style>
  </head>
